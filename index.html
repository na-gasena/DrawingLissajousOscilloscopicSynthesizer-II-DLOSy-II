<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DLOSy20 - Web Synthesizer</title>
    <meta
      name="description"
      content="Hardware-like web synthesizer with step sequencer, VCO loop, and drawing mode waveform generation."
    />
    <link rel="stylesheet" href="styles/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="synth-app">
      <!-- ===== HEADER ===== -->
      <header id="synth-header">
        <div class="header-controls">
          <div class="transport-group">
            <button id="btn-play" class="transport-btn" aria-label="Play/Stop">
              <span class="play-icon">▶</span>
            </button>
            <div class="tempo-display">
              <span class="label">BPM</span>
              <span id="tempo-value" class="value">120</span>
            </div>
          </div>
          <div class="master-vol-group">
            <span class="label">MASTER</span>
            <div
              id="knob-master-vol"
              class="knob"
              data-param="masterVol"
              data-min="0"
              data-max="1"
              data-value="0.7"
            ></div>
          </div>
        </div>
      </header>

      <!-- ===== MAIN PANEL ===== -->
      <main id="synth-main">
        <!-- --- LEFT: Synth Controls --- -->
        <section id="panel-synth" class="panel">
          <!-- Left Panel Tab Bar -->
          <div class="left-tabs">
            <button class="left-tab active" data-left-tab="synth">SYNTH</button>
            <button class="left-tab" data-left-tab="settings">SETTINGS</button>
          </div>

          <!-- SYNTH Tab Content (SEQUENCER only) -->
          <div id="left-tab-synth" class="left-tab-content active">
            <!-- Waveform Select -->
            <div class="control-row">
              <div class="wave-select-group">
                <span class="label">WAVE</span>
                <div class="wave-buttons">
                  <button class="wave-btn active" data-wave="sine">SIN</button>
                  <button class="wave-btn" data-wave="triangle">TRI</button>
                  <button class="wave-btn" data-wave="square">SQR</button>
                  <button class="wave-btn" data-wave="sawtooth">SAW</button>
                  <button class="wave-btn drawing-btn" data-wave="drawing">
                    DRAW
                  </button>
                </div>
              </div>
            </div>

            <!-- Knobs Row: Cutoff, Resonance, Volume -->
            <div class="control-row knobs-row">
              <div class="knob-group">
                <div
                  id="knob-cutoff"
                  class="knob"
                  data-param="cutoff"
                  data-min="100"
                  data-max="5000"
                  data-value="2000"
                ></div>
                <span class="label">CUTOFF</span>
              </div>
              <div class="knob-group">
                <div
                  id="knob-resonance"
                  class="knob"
                  data-param="resonance"
                  data-min="0"
                  data-max="30"
                  data-value="5"
                ></div>
                <span class="label">RES</span>
              </div>
              <div class="knob-group">
                <div
                  id="knob-synth-vol"
                  class="knob"
                  data-param="synthVol"
                  data-min="0"
                  data-max="1"
                  data-value="0.5"
                ></div>
                <span class="label">VOL</span>
              </div>
            </div>

            <!-- ADSR Envelope Curve Editor -->
            <div class="control-row">
              <div class="adsr-editor-wrapper">
                <span class="label">ADSR ENVELOPE</span>
                <div class="adsr-canvas-container">
                  <canvas id="adsr-canvas" width="240" height="100"></canvas>
                </div>
                <div class="adsr-values" id="adsr-values"></div>
              </div>
            </div>

            <!-- Octave -->
            <div class="control-row">
              <div class="octave-group">
                <span class="label">OCTAVE</span>
                <button id="btn-oct-down" class="small-btn">−</button>
                <div class="led-row" id="oct-leds">
                  <div class="led"></div>
                  <div class="led active"></div>
                  <div class="led"></div>
                  <div class="led"></div>
                  <div class="led"></div>
                </div>
                <button id="btn-oct-up" class="small-btn">+</button>
              </div>
            </div>

            <!-- Delay -->
            <div class="control-row knobs-row">
              <div class="knob-group">
                <div
                  id="knob-delay-time"
                  class="knob"
                  data-param="delayTime"
                  data-min="0.01"
                  data-max="0.5"
                  data-value="0.2"
                ></div>
                <span class="label">DLY TIME</span>
              </div>
              <div class="knob-group">
                <div
                  id="knob-delay-fb"
                  class="knob"
                  data-param="delayFeedback"
                  data-min="0"
                  data-max="0.8"
                  data-value="0"
                ></div>
                <span class="label">DLY FB</span>
              </div>
            </div>
          </div>

          <!-- SETTINGS Tab Content (always available) -->
          <div id="left-tab-settings" class="left-tab-content">
            <!-- Tempo & Swing Knobs -->
            <div class="control-row knobs-row">
              <div class="knob-group">
                <div
                  id="knob-tempo"
                  class="knob"
                  data-param="tempo"
                  data-min="40"
                  data-max="240"
                  data-value="120"
                ></div>
                <span class="label">TEMPO</span>
              </div>
              <div class="knob-group">
                <div
                  id="knob-swing"
                  class="knob"
                  data-param="swing"
                  data-min="0"
                  data-max="100"
                  data-value="0"
                ></div>
                <span class="label">SWING</span>
              </div>
            </div>

            <!-- CV Clock Sync -->
            <div class="control-row">
              <div id="cv-clock-panel"></div>
            </div>

            <!-- MIDI IN -->
            <div class="control-row">
              <div id="midi-in-panel"></div>
            </div>

            <!-- Preset SAVE/LOAD (moved from header) -->
            <div class="control-row">
              <div id="preset-panel" class="preset-settings-panel"></div>
            </div>
          </div>
        </section>

        <!-- --- CENTER: Sequencer / Drums (Tab Switch) --- -->
        <section id="panel-center" class="panel">
          <!-- Tab Bar -->
          <div class="center-tabs">
            <button class="center-tab active" data-tab="sequencer">SEQUENCER</button>
            <button class="center-tab" data-tab="drums">DRUMS</button>
            <button class="center-tab" data-tab="arp">ARP</button>
            <button class="center-tab" data-tab="ease">EASE</button>
            <button class="center-tab" data-tab="glyph">GLYPH</button>
          </div>

          <!-- Tab Content: Sequencer -->
          <div id="center-tab-sequencer" class="center-tab-content active">
            <!-- Step Sequencer -->
            <div id="sequencer-section">
              <div class="panel-title">
                STEP SEQUENCER
                <div class="seq-controls">
                  <button id="btn-seq-toggle" class="small-btn seq-toggle-btn">OFF</button>
                  <button id="btn-seq-random" class="small-btn" title="Random pattern">RND</button>
                  <select id="seq-scale-select" class="seq-scale-select" title="Scale">
                    <option value="major">Major</option>
                    <option value="minor">Minor</option>
                    <option value="pentatonic">Penta</option>
                    <option value="minorPenta">m.Penta</option>
                    <option value="blues">Blues</option>
                    <option value="dorian">Dorian</option>
                    <option value="mixolydian">Mixo</option>
                    <option value="wholeTone">W.Tone</option>
                    <option value="chromatic">Chrom</option>
                  </select>
                  <select id="seq-oct-select" class="seq-scale-select" title="Octave range">
                    <option value="3,4,5" selected>C3-C5</option>
                    <option value="1">C1</option>
                    <option value="2">C2</option>
                    <option value="3">C3</option>
                    <option value="4">C4</option>
                    <option value="5">C5</option>
                    <option value="1,2,3">C1-C3</option>
                    <option value="2,3,4">C2-C4</option>
                    <option value="4,5,6">C4-C6</option>
                  </select>
                  <div class="knob-group knob-group-inline">
                    <div
                      id="knob-master-freq"
                      class="knob"
                      data-param="masterFreqShift"
                      data-min="-24"
                      data-max="24"
                      data-value="0"
                    ></div>
                    <span class="label">PITCH</span>
                  </div>
                  <button id="btn-steps-16" class="small-btn step-count-btn active">16</button>
                  <button id="btn-steps-32" class="small-btn step-count-btn">32</button>
                </div>
              </div>
              <div id="step-pads" class="step-pad-row">
                <!-- 16 pads generated by JS -->
              </div>
            </div>

            <!-- Keyboard -->
            <div id="keyboard-section">
              <div class="keyboard" id="keyboard">
                <!-- Keys generated by JS -->
              </div>
            </div>
          </div>

          <!-- Tab Content: Drums -->
          <div id="center-tab-drums" class="center-tab-content">
            <div class="panel-title">
              DRUMS
              <div id="midi-out-panel"></div>
            </div>
            <div class="drum-layout">
              <div id="drum-tracks">
                <!-- Drum tracks with inline controls generated by JS -->
              </div>
            </div>
          </div>

          <!-- Tab Content: Arpeggiator -->
          <div id="center-tab-arp" class="center-tab-content">
            <!-- Arpeggiator UI generated by JS -->
          </div>

          <!-- Tab Content: VCO Loop Easing -->
          <div id="center-tab-ease" class="center-tab-content">
            <!-- Easing UI generated by JS -->
          </div>

          <!-- Tab Content: Glyph Search -->
          <div id="center-tab-glyph" class="center-tab-content">
            <div id="unim-search-panel"></div>
          </div>
        </section>

        <!-- --- RIGHT: Effects Panel --- -->
        <section id="panel-effects" class="panel">
          <!-- Effects UI generated by JS -->
        </section>
      </main>

      <!-- ===== BOTTOM: VCO Loop & Drawing (placeholder) ===== -->
      <section id="panel-bottom">
        <div id="vco-loop-panel" class="panel">
          <!-- VCO Loop UI generated by JS -->
        </div>
        <div id="drawing-panel" class="panel">
          <!-- Drawing Mode UI generated by JS -->
        </div>
      </section>

      <!-- ===== FOOTER ===== -->
      <footer id="synth-footer">
        <span>DLOSy20 Web Synthesizer</span>
        <span class="footer-hint"
          >Keyboard: S D F G H J K L = White keys / E R T Y U I = Black
          keys</span
        >
      </footer>
    </div>

    <!-- Scripts (ESM entry; モジュールの読み込み順は app.js の import で管理) -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
